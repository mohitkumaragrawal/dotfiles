[general]
import = [
    "~/.config/alacritty/themes/kanagawa_wave.toml"
]

[font]
size = 12.0

# The normal (default) text font
[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

# Bold text
[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

# Italic text
[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

# Bold Italic text
[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"


[window]
opacity = 0.9
