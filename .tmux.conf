set -a terminal-features "tmux-256color:RGB"

unbind r
bind r source-file ~/.tmux.conf

set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Set prefix to Ctrl-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

bind-key C-n next-window
bind-key C-p previous-window
bind-key C-[ copy-mode

bind-key | split-window -h
bind-key - split-window -v

bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection

set -g history-limit 8192
set -g renumber-windows on
set -g status-justify absolute-centre
set -g status-style "bg=default,fg=#938aa9"
set -g status-left-length 24
set -g status-left "#[fg=#16161d,bg=#7e9cd8,bold] #S #[default]"
set -g status-right ""
set -g window-status-separator " "
set -g window-status-style "fg=#938aa9,bg=default"
set -g window-status-format "#[fg=#938aa9] #I #W #[default]"
set -g window-status-current-format "#[fg=#dcd7ba,bg=#2d4f67,bold] #I #W #[default]"
set -g pane-border-style "fg=#2a2a37"
set -g pane-active-border-style "fg=#7e9cd8"
set -g message-style "fg=#dcd7ba,bg=#2d4f67,bold"
set -g mode-style "fg=#16161d,bg=#c0a36e,bold"
# set -gq allow-passthrough on
# set -g visual-activity off

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set-option -g status-position top

set-window-option -g mode-keys vi
run '~/.tmux/plugins/tpm/tpm'

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
